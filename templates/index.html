<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaúdeAP — Consulta de Medicamentos UBS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
</head>
<body>
  <!-- Header -->
  <header style="background:var(--card);border-bottom:1px solid var(--border);">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;padding:1rem;">
      <a href="{{ url_for('index') }}" style="display:flex;align-items:center;gap:0.625rem;">
        <div class="sidebar-logo">❤</div>
        <div>
          <h1 style="font-size:1.125rem;font-weight:700;line-height:1.2;">SaúdeAP</h1>
          <p style="font-size:0.625rem;color:var(--text-muted);">Medicamentos UBS do Amapá</p>
        </div>
      </a>
      <a href="{{ url_for('auth.login') }}">
        <button class="btn btn-outline btn-sm">Área Restrita</button>
      </a>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,138,94,0.05),rgba(14,165,233,0.05),transparent);"></div>
    <div class="container" style="position:relative;text-align:center;padding:4rem 1rem 6rem;">
      <span class="hero-badge">
        💊 Consulta gratuita de medicamentos
      </span>
      <h2 style="font-size:2rem;max-width:48rem;margin:0 auto;line-height:1.3;">
        Encontre seu medicamento na UBS mais próxima
      </h2>
      <p style="color:var(--text-muted);margin-top:1rem;max-width:36rem;margin-left:auto;margin-right:auto;font-size:1.125rem;">
        Consulte a disponibilidade de medicamentos nas Unidades Básicas de Saúde do Amapá sem sair de casa.
      </p>

      <!-- Search -->
      <div class="hero-search">
        <div>
          <input type="text" id="searchInput" placeholder="Digite o nome do medicamento..."
            class="form-input"
            onkeydown="if(event.key==='Enter') searchMed()">

      
          <button class="btn btn-primary btn-lg" onclick="searchMed()" id="searchBtn">Buscar</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Tabs -->
  <div class="container">
    <div class="tabs-container">
      <button onclick="setTab('buscar')" id="tab-buscar" class="tab-btn active">Resultados</button>
      <button onclick="setTab('ubs')" id="tab-ubs" class="tab-btn">Nossas UBS</button>
    </div>
  </div>

  <!-- Content -->
  <div class="container" style="padding-bottom:3rem;">
    <div id="tabContent"></div>
  </div>

  <!-- Footer -->
  <footer style="border-top:1px solid var(--border);margin-top:3rem;">
    <div class="container" style="padding:1.5rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span style="color:var(--primary);">❤</span>
        <span style="font-size:0.875rem;color:var(--text-muted);">SaúdeAP — Sistema de Consulta de Medicamentos</span>
      </div>
      <span style="font-size:0.75rem;color:var(--text-muted);">Amapá, Brasil</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

  <script>
    let activeTab = 'buscar';
    let ubsList = [];

    async function loadUBS() {
      ubsList = await api('/api/ubs');
      renderTab();
    }

    function setTab(tab) {
      activeTab = tab;
      document.getElementById('tab-buscar').classList.toggle('active', tab === 'buscar');
      document.getElementById('tab-ubs').classList.toggle('active', tab === 'ubs');
      renderTab();
    }

    function renderTab() {
      const el = document.getElementById('tabContent');
      if (activeTab === 'ubs') {
        if (ubsList.length === 0) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🏥</div><h3>Nenhuma UBS cadastrada</h3></div>`;
          return;
        }
        el.innerHTML = `<div style="display:grid;gap:1rem;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));">` +
        ubsList.map(u => `
          <a href="/ubs/${u.id}"
            style="text-decoration:none;color:inherit;display:block;">

            <div class="card card-hover"
                style="cursor:pointer;transition:.25s;">

              <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">

                <div style="
                    width:40px;
                    height:40px;
                    border-radius:12px;
                    background:var(--primary-light);
                    display:flex;
                    align-items:center;
                    justify-content:center;
                ">
                    🏥
                </div>

                <h3 style="font-weight:600;">
                    ${u.nome}
                </h3>

              </div>

              <div style="font-size:.875rem;color:var(--text-muted);">

                  <p>📍 ${u.endereco}, ${u.bairro}</p>

                  ${u.telefone ? `
                      <p>📞 ${u.telefone}</p>
                  ` : ""}

                  ${u.horario_funcionamento ? `
                      <p>🕐 ${u.horario_funcionamento}</p>
                  ` : ""}

              </div>

              <div style="
                  margin-top:18px;
                  color:#16a34a;
                  font-weight:600;
              ">
                  Ver localização →
              </div>

            </div>

          </a>
        `).join('') + `</div>`;
      } else {
        el.innerHTML = `<div style="text-align:center;padding:3rem 1rem;">
          <div class="empty-state-icon">🔍</div>
          <h3 style="font-weight:600;font-size:1.125rem;">Pesquise um medicamento</h3>
          <p style="font-size:0.875rem;color:var(--text-muted);margin-top:0.25rem;">Digite o nome ou princípio ativo para encontrar onde está disponível</p>
        </div>`;
      }
    }

    async function searchMed() {
      const term = document.getElementById('searchInput').value.trim();
      if (!term) return;
      const btn = document.getElementById('searchBtn');
      btn.textContent = 'Buscando...';
      btn.disabled = true;
      try {
        const results = await api(`/api/consulta?q=${encodeURIComponent(term)}`);
        const el = document.getElementById('tabContent');
        if (results.length === 0) {
          el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">❌</div><h3>Nenhum resultado encontrado</h3><p style="color:var(--text-muted);">Não encontramos "${term}" disponível nas UBS.</p></div>`;
        } else {
          el.innerHTML = `<p style="font-size:0.875rem;color:var(--text-muted);margin-bottom:1rem;">${results.length} medicamento(s) encontrado(s) para "${term}"</p>` +
            results.map(item => `
              <div class="card" style="margin-bottom:1rem;">
                <div style="padding-bottom:1rem;border-bottom:1px solid var(--border);">
                  <div style="display:flex;justify-content:space-between;align-items:start;">
                    <div>
                      <h3 style="font-weight:600;font-size:1.125rem;">${item.medicamento.nome}</h3>
                      <p style="font-size:0.875rem;color:var(--text-muted);">${item.medicamento.principio_ativo}${item.medicamento.dosagem ? ' • ' + item.medicamento.dosagem : ''}</p>
                    </div>
                    <span class="badge badge-info">${item.unidades.length} UBS</span>
                  </div>
                </div>
                ${item.unidades.map(u => {
                  const status = getEstoqueStatus(u.quantidade);
                  return `<div style="padding:0.75rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                    <div style="display:flex;align-items:center;gap:0.75rem;">
                      <div style="width:32px;height:32px;border-radius:0.5rem;background:var(--primary-light);display:flex;align-items:center;justify-content:center;">🏥</div>
                      <div>
                        <p style="font-size:0.875rem;font-weight:500;">${u.ubs.nome}</p>
                        <p style="font-size:0.75rem;color:var(--text-muted);">${u.ubs.bairro} — ${u.ubs.endereco}</p>
                      </div>
                    </div>
                    <span class="badge ${status.class}">${status.label}</span>
                  </div>`;
                }).join('')}
              </div>`).join('');
        }
      } catch(e) {
        showToast('Erro ao buscar medicamentos', 'error');
      }
      btn.textContent = 'Buscar';
      btn.disabled = false;
    }

    loadUBS();
  </script>
  
</body>
</html>
