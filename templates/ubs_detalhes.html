
<div class="container mt-4">

    <h2>{{ ubs.nome }}</h2>

    <hr>

    <p><strong>Endereço:</strong> {{ ubs.endereco }}</p>

    <p><strong>Bairro:</strong> {{ ubs.bairro }}</p>

    <p><strong>Cidade:</strong> {{ ubs.cidade }}</p>

    <p><strong>Telefone:</strong> {{ ubs.telefone or "Não informado" }}</p>

    <p><strong>Horário:</strong> {{ ubs.horario_funcionamento or "Não informado" }}</p>

</div>
