<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaúdeAP — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div class="card" style="max-width:400px;width:100%;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div class="sidebar-logo" style="margin:0 auto 1rem;width:48px;height:48px;font-size:1.5rem;">❤</div>
      <h1 style="font-size:1.5rem;font-weight:700;">SaúdeAP</h1>
      <p style="font-size:0.875rem;color:var(--text-muted);">Acesse a área administrativa</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="padding:0.75rem;border-radius:0.5rem;margin-bottom:1rem;font-size:0.875rem;background:{{ 'var(--danger-light)' if category == 'error' else 'var(--success-light)' }};color:{{ 'var(--danger)' if category == 'error' else 'var(--success)' }};">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="form-input" placeholder="voce@exemplo.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Entrar</button>
    </form>

    <div style="text-align:center;margin-top:1rem;">
      <a href="{{ url_for('index') }}" style="font-size:0.875rem;">← Voltar à consulta pública</a>
    </div>
  </div>
</body>
</html>
